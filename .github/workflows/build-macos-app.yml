name: Build macOS RPG app

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-macos-app:
    name: Build RPG.app
    runs-on: macos-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install native dependencies
        run: |
          brew update
          brew install cairo pkg-config

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller pyinstaller-hooks-contrib
          python -m pip freeze

      - name: Check Python source
        run: |
          python -m compileall rpg.py
          python - <<'PY'
          import arcade
          import cairo
          from PIL import Image
          print("imports ok")
          print("arcade", arcade.__version__)
          print("cairo", cairo.version)
          print("pillow", Image.__version__)
          PY

      - name: Build RPG.app
        env:
          PYINSTALLER_STRICT_UNPACK_MODE: "0"
        run: |
          set -o pipefail
          ARCADE_ROOT="$(python - <<'PY'
          import arcade
          from pathlib import Path
          print(Path(arcade.__file__).parent)
          PY
          )"
          python -m PyInstaller \
            --noconfirm \
            --clean \
            --windowed \
            --noupx \
            --log-level INFO \
            --name RPG \
            --add-data "$ARCADE_ROOT/VERSION:arcade" \
            --add-data "$ARCADE_ROOT/resources:arcade/resources" \
            --collect-data pyglet \
            --collect-data pytiled_parser \
            --collect-data PIL \
            --collect-binaries arcade \
            --collect-binaries pyglet \
            --collect-binaries pymunk \
            --hidden-import arcade.gl.backends.opengl \
            --hidden-import pyglet.window.cocoa \
            --hidden-import pyglet.gl.cocoa \
            --collect-submodules pymunk \
            rpg.py 2>&1 | tee pyinstaller-build.log

      - name: Upload build diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: RPG-build-diagnostics
          path: |
            build/RPG/
            RPG.spec
            pyinstaller-build.log
          if-no-files-found: ignore

      - name: Package app
        run: |
          test -d dist/RPG.app
          ditto -c -k --sequesterRsrc --keepParent dist/RPG.app RPG-macOS.zip

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: RPG-macOS-app
          path: RPG-macOS.zip
          if-no-files-found: error
