name: Build macOS RPG app

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-macos-app:
    name: Build RPG.app
    runs-on: macos-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install native dependencies
        run: |
          brew update
          brew install cairo pkg-config

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller pyinstaller-hooks-contrib py2app
          python -m pip freeze

      - name: Check Python source
        run: |
          python -m compileall rpg.py
          python - <<'PY'
          import arcade
          import cairo
          from PIL import Image
          print("imports ok")
          print("arcade", arcade.__version__)
          print("cairo", cairo.version)
          print("pillow", Image.__version__)
          PY

      - name: Build RPG.app
        id: pyinstaller
        continue-on-error: true
        env:
          PYINSTALLER_STRICT_UNPACK_MODE: "0"
        run: |
          set -o pipefail
          python -m PyInstaller \
            --noconfirm \
            --clean \
            --windowed \
            --noupx \
            --log-level INFO \
            --name RPG \
            --collect-all arcade \
            --collect-all pyglet \
            --collect-all pytiled_parser \
            --collect-all PIL \
            --collect-submodules pymunk \
            rpg.py 2>&1 | tee pyinstaller-build.log

      - name: Build RPG.app with py2app fallback
        if: steps.pyinstaller.outcome == 'failure'
        run: |
          rm -rf build dist
          python setup_macos.py py2app 2>&1 | tee py2app-build.log
          if [ -d dist/rpg.app ] && [ ! -d dist/RPG.app ]; then
            mv dist/rpg.app dist/RPG.app
          fi

      - name: Upload build diagnostics
        if: steps.pyinstaller.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: RPG-build-diagnostics
          path: |
            build/RPG/
            RPG.spec
            pyinstaller-build.log
            py2app-build.log
          if-no-files-found: ignore

      - name: Package app
        run: |
          test -d dist/RPG.app
          ditto -c -k --sequesterRsrc --keepParent dist/RPG.app RPG-macOS.zip

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: RPG-macOS-app
          path: RPG-macOS.zip
          if-no-files-found: error
