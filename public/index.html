<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>餘燼王國 RPG</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="game-shell">
    <section class="left-rail" aria-label="角色與冒險紀錄">
      <div class="brand-mark">R</div>
      <section class="status-panel" aria-label="角色資料">
        <div class="panel-title">角色資料</div>
        <div id="heroName" class="hero-name">未立誓者</div>
        <div id="heroLine" class="hero-line">星火尚未回應</div>
        <div class="stat-grid">
          <div><span>血量</span><strong id="statHp">20</strong></div>
          <div><span>攻擊</span><strong id="statAtk">10</strong></div>
          <div><span>防禦</span><strong id="statDef">10</strong></div>
          <div><span>幸運</span><strong id="statLuck">1</strong></div>
          <div><span>金幣</span><strong id="statGold">0g</strong></div>
          <div><span>經驗</span><strong id="statExp">0/1</strong></div>
        </div>
      </section>
      <section class="log-panel" aria-label="冒險紀錄">
        <div class="panel-title">冒險紀錄</div>
        <div id="logList" class="log-list"></div>
      </section>
    </section>

    <section class="stage-area" aria-label="遊戲畫面">
      <canvas id="sceneCanvas" width="960" height="620"></canvas>
      <div class="scene-overlay">
        <div id="sceneKicker" class="scene-kicker">暮色遠征</div>
        <h1 id="sceneTitle">餘燼王國</h1>
        <p id="sceneText">黑潮越過北境長城，古老王城只剩最後一盞不滅烽火。</p>
      </div>
      <div id="battlePanel" class="battle-panel" hidden>
        <div class="combatant">
          <div id="playerBadge" class="portrait hero"></div>
          <div>
            <strong id="battlePlayerName">旅人</strong>
            <div class="bar"><span id="playerHpBar"></span></div>
            <small id="playerBattleStats"></small>
          </div>
        </div>
        <div class="versus">VS</div>
        <div class="combatant enemy">
          <div id="enemyBadge" class="portrait monster rank-1"></div>
          <div>
            <strong id="enemyName">魔物</strong>
            <div class="bar red"><span id="enemyHpBar"></span></div>
            <small id="enemyBattleStats"></small>
          </div>
        </div>
      </div>
      <div id="choiceGrid" class="choice-grid"></div>
      <div id="actionBar" class="action-bar"></div>
    </section>
  </main>
  <script src="game.js"></script>
</body>
</html>
